<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Moroccan Vibes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1 class="logo">Moroccan Vibes</h1>
        <nav class="nav">
          <a class="btn" href="#links">TikTok Links</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container">
          <h2>Modern Moroccan style — curated TikToks</h2>
          <p class="lead">A simple gallery of curated short videos. Click any card to open the original video on TikTok.</p>
        </div>
      </section>

    </section>

      <!-- gallery of Moroccan photos -->
      <section class="gallery container" aria-label="Moroccan photos">
        <img src="images/IMAGE2.avif" alt="Moroccan scene 1" class="gallery-img" />
        <img src="images/IMAGE3.avif" alt="Moroccan scene 2" class="gallery-img" />
        <img src="images/imqge.avif" alt="Moroccan scene 3" class="gallery-img" />
      </section>

      <section id="links" class="links container">
        <div class="card">
          <iframe src="https://www.tiktok.com/embed/7570013306329599239" width="280" height="498" frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="card">
          <iframe src="https://www.tiktok.com/embed/ZSmTkAvnv" width="280" height="498" frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="card">
          <iframe src="https://www.tiktok.com/embed/7611957896028425480" width="280" height="498" frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="card">
          <iframe src="https://www.tiktok.com/embed/7611539643837828370" width="280" height="498" frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="card">
          <iframe src="https://www.tiktok.com/embed/7610044848137080082" width="280" height="498" frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="card">
          <iframe src="https://www.tiktok.com/embed/ZSmTkq2Sd" width="280" height="498" frameborder="0" allowfullscreen></iframe>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>Made with ❤️ — Moroccan Vibes</p>
      </div>
    </footer>
  </body>
</html>
